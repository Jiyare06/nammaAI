databases:
  - name: namma-traffic-db
    databaseName: namma_traffic
    user: namma_user
    plan: free              # 90-day free Postgres on Render

services:
  - type: web
    name: namma-traffic-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: namma-traffic-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true     # Render generates a secure random value automatically
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: FRONTEND_URL
        sync: false             # fill in after Vercel deploys (e.g. https://namma-traffic.vercel.app)
      - key: GEMINI_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: REDIS_URL
        sync: false             # optional – leave blank if not using Upstash
