services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: namma_traffic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - osmnx_cache:/app/cache
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/namma_traffic
      FRONTEND_URL: http://localhost:3000
      SECRET_KEY: change-me-in-production
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  osmnx_cache:
